<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevalier Steampunk - Jeu de Plateforme</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles inline pour éviter les problèmes de chargement */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #e0d8c0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #game-container {
            position: relative;
            width: 1200px;
            height: 800px;
            background-color: #0a0a0a;
            border: 4px solid #5c4a2a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(92, 74, 42, 0.7);
            overflow: hidden;
        }
        
        #game-canvas {
            background-color: #121212;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="1200" height="800"></canvas>
        <div id="ui">
            <div id="lives">
                <label>Vies : </label>
                <span id="lives-value">❤️ 3</span>
            </div>
            <div id="fuel-gauge">
                <label>Carburant :</label>
                <progress id="fuel-bar" value="100" max="100"></progress>
                <span id="fuel-value">100%</span>
            </div>
            <div id="score">
                <label>Score : </label>
                <span id="score-value">0</span>
            </div>
        </div>
    </div>
    <div id="instructions">
        <h2>Contrôles :</h2>
        <p>→ ← : Se déplacer</p>
        <p>↑ ou Espace : Sauter</p>
        <p>Maj : Activer le jetpack</p>
        <p>R : Réinitialiser le niveau</p>
        <p>⚠️ Attention aux tonneaux !</p>
        <p>💰 Collectez les pièces !</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
